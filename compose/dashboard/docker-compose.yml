services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1
    container_name: homepage
#    ports:
#      - 3000:3000
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "homeserver.harryzhong.com"
      TZ: "$TZ"
      HOMEPAGE_VAR_QBIT_USER: "$QBIT_USER"
      HOMEPAGE_VAR_QBIT_PASS: "$QBIT_PWD"
    volumes:
      - ./homepage_config:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock # (optional) For docker integrations
      - /media/storage:/media/storage:ro
    restart: unless-stopped
  uptime_kuma:
    image: ghcr.io/louislam/uptime-kuma:2
    container_name: uptime_kuma
    restart: unless-stopped
    environment:
      TZ: "$TZ"
    volumes:
      - $DOCKERDIR/appdata/uptime_kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
#    ports:
#      - 3004:3001