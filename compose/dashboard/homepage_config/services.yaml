- Networking:
    - qBittorrent:
        href: https://qbittorrent.homeserver.harryzhong.com
        icon: qbittorrent.svg
        server: my-docker
        container: qbittorrent
        widget:
            type: qbittorrent
            url: http://gluetun:8080
            username: "{{HOMEPAGE_VAR_QBIT_USER}}"
            password: "{{HOMEPAGE_VAR_QBIT_PASS}}"
            fields: ["leech", "seed", "download", "upload"]
    - Prowlarr:
        href: https://prowlarr.homeserver.harryzhong.com
        icon: prowlarr.svg
        server: my-docker
        container: prowlarr
    - AdGuard Home:
        href: https://adguard.homeserver.harryzhong.com
        icon: adguard-home.svg
        server: my-docker
        container: adguardhome
- Misc:
    - Game Servers:
        - Minecraft:
            server: my-docker
            container: mc
            widget:
            type: minecraft
            url: udp://100.124.170.127:25565
        - Terraria:
            server: my-docker
            container: tmodloader
    - Hardware Monitoring:
        - Scrutiny:
            href: https://scrutiny.homeserver.harryzhong.com
