services:
  tailscale:
    container_name: tailscale
    hostname: tailscale-optiplex
    image: ghcr.io/tailscale/tailscale:stable
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-exit-node
    volumes:
      - $DOCKERDIR/appdata/tailscale/lib:/var/lib # State data will be stored in this directory
      - /dev/net/tun:/dev/net/tun # Required for tailscale to work
    cap_add: # Required for tailscale to work
      - net_admin
      - sys_module
    command: tailscaled
    privileged: true
    restart: always
    network_mode: host
  nginxproxymanager:
    container_name: nginxproxymanager
    image: jc21/nginx-proxy-manager:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - $DOCKERDIR/appdata/nginxproxymanager/data:/data
      - $DOCKERDIR/appdata/nginxproxymanager/letsencrypt:/etc/letsencrypt
  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome:latest
    restart: unless-stopped
    environment:
      - TZ=$TZ
    volumes:
      - $DOCKERDIR/appdata/adguardhome/work:/opt/adguardhome/work
      - $DOCKERDIR/appdata/adguardhome/conf:/opt/adguardhome/conf
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 82:80/tcp
      - 444:443/tcp
      - 444:443/udp
      - 3003:3000/tcp
  cloudflare_ddns:
    image: favonia/cloudflare-ddns:1
    container_name: cloudflare_ddns
    restart: always
    user: "1000:1000"
    read_only: true
    cap_drop: [all]
    security_opt: [no-new-privileges:true]
    environment:
      - CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN
      - DOMAINS=harrys-lab.com
      - PROXIED=true
      - IP6_PROVIDER=none