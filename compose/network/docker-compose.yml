services:
  tailscale:
    container_name: tailscale
    hostname: tailscale-optiplex
    image: ghcr.io/tailscale/tailscale:stable
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-exit-node
    volumes:
      - $DOCKERDIR/appdata/tailscale/lib:/var/lib # State data will be stored in this directory
      - /dev/net/tun:/dev/net/tun # Required for tailscale to work
    cap_add: # Required for tailscale to work
      - net_admin
      - sys_module
    command: tailscaled
    privileged: true
    restart: always
    network_mode: host
  caddy:
    image: ghcr.io/serfriz/caddy-cloudflare-crowdsec:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - CLOUDFLARE_API_TOKEN_INTERNAL=$CLOUDFLARE_API_TOKEN_INTERNAL
      - CLOUDFLARE_API_TOKEN_PUBLIC=$CLOUDFLARE_API_TOKEN_PUBLIC
      - CROWDSEC_API_KEY=$CROWDSEC_API_KEY
    volumes:
      - ./caddy_conf:/etc/caddy
      - $DOCKERDIR/appdata/caddy/data:/data
      - $DOCKERDIR/appdata/caddy/config:/config
      - $DOCKERDIR/appdata/caddy/logs:/var/log/caddy
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    environment:
      - GID=1000
      - COLLECTIONS=crowdsecurity/caddy crowdsecurity/base-http-scenarios
    volumes:
      - ./crowdsec_conf/acquis.yaml:/etc/crowdsec/acquis.yaml
      - $DOCKERDIR/appdata/crowdsec/data:/var/lib/crowdsec/data
      - $DOCKERDIR/appdata/crowdsec/config:/etc/crowdsec
      - $DOCKERDIR/appdata/caddy/logs:/var/log/caddy:ro
    restart: unless-stopped
    depends_on:
      - caddy
  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome:latest
    restart: unless-stopped
    environment:
      - TZ=$TZ
    volumes:
      - $DOCKERDIR/appdata/adguardhome/work:/opt/adguardhome/work
      - $DOCKERDIR/appdata/adguardhome/conf:/opt/adguardhome/conf
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 82:80/tcp
  cloudflare_ddns:
    image: favonia/cloudflare-ddns:1
    container_name: cloudflare_ddns
    restart: always
    user: "1000:1000"
    read_only: true
    cap_drop: [all]
    security_opt: [no-new-privileges:true]
    environment:
      - CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN_PUBLIC
      - DOMAINS=harrys-lab.com
      - PROXIED=true
      - IP6_PROVIDER=none