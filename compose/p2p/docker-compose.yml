services:
  qbittorrent:
    image: ghcr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - $DOCKERDIR/appdata/qbittorrent/config:/config
      - $MEDIADIR:/data
    restart: unless-stopped
    network_mode: service:gluetun
    labels:
      - "com.centurylinklabs.watchtower.depends-on=gluetun"
    depends_on:
      gluetun:
        condition: service_started
  gluetun:
    image: ghcr.io/qdm12/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=$TZ
      - VPN_SERVICE_PROVIDER=protonvpn
      - OPENVPN_USER=$OPENVPN_USER
      - OPENVPN_PASSWORD=$OPENVPN_PASSWORD
      - SERVER_COUNTRIES=$SERVER_COUNTRIES
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- --retry-connrefused --post-data "json={\"listen_port\":{{PORTS}}}" http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
      - HEALTH_SUCCESS_WAIT_DURATION=99999h
    ports:
#      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
  cleanup_downloads:
    image: ghcr.io/astral-sh/uv:python3.12-alpine
    container_name: cleanup_downloads
    volumes:
      - $DOCKERDIR/scripts/cleanup_downloads.py:/app/cleanup_downloads.py:ro
      - $MEDIADIR:/data
    environment:
      - MEDIADIR=/data
      - QBIT_USER=$QBIT_USER
      - QBIT_PWD=$QBIT_PWD
      - QBIT_HOST=http://gluetun:8080
      - TZ=$TZ
      - CRON_SCHEDULE=0 3 * * *
      - PYTHONUNBUFFERED=1
    working_dir: /app
    command: uv run cleanup_downloads.py
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_started
